{% extends "base.html" %}

{% block title %}Смена пароля - Админ-панель{% endblock %}

{% block content %}
<div class="admin-panel">
    <h2><i class="fas fa-key"></i> Смена пароля</h2>
    
    <div class="form-container">
        <p>Пользователь: <strong>{{ user.username }}</strong></p>
        
        <form method="POST">
            <div class="form-group">
                <label for="new_password">Новый пароль:</label>
                <input type="password" id="new_password" name="new_password" class="form-control" required minlength="3">
            </div>

            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля:</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="3">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Изменить пароль</button>
                <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
