{% extends "base.html" %}

{% block title %}Пользователи онлайн - Task-Chat{% endblock %}

{% block extra_css %}
<style>
    .online-users-page {
        max-width: 900px;
        margin: 0 auto;
    }

    .online-users-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 2px solid var(--primary-light);
    }

    .online-users-header h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--dark);
        margin: 0;
    }

    .online-count {
        background: var(--success);
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 14px;
    }

    .department-section {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .department-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--light);
    }

    .department-icon {
        width: 36px;
        height: 36px;
        background: var(--primary-light);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        font-size: 18px;
    }

    .department-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--dark);
        flex: 1;
    }

    .department-users-count {
        background: var(--light);
        color: var(--gray);
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
    }

    .users-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .user-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-radius: 8px;
        background: var(--light);
        transition: background 0.2s;
    }

    .user-card:hover {
        background: #e8e8f0;
    }

    .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
    }

    .user-avatar.doctor {
        background: #e3f2fd;
        color: #1976d2;
    }

    .user-avatar.physicist {
        background: #f3e5f5;
        color: #7b1fa2;
    }

    .user-avatar.admin {
        background: #ffebee;
        color: #c62828;
    }

    .user-info {
        flex: 1;
        min-width: 0;
    }

    .user-name {
        font-weight: 600;
        color: var(--dark);
        font-size: 14px;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .user-username {
        font-size: 12px;
        color: var(--gray);
    }

    .user-role-badge {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        flex-shrink: 0;
    }

    .user-role-badge.doctor {
        background: #e3f2fd;
        color: #1976d2;
    }

    .user-role-badge.physicist {
        background: #f3e5f5;
        color: #7b1fa2;
    }

    .user-role-badge.admin {
        background: #ffebee;
        color: #c62828;
    }

    .user-status {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 6px var(--success);
        flex-shrink: 0;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--gray);
    }

    .empty-state i {
        font-size: 64px;
        margin-bottom: 16px;
        opacity: 0.5;
    }

    .empty-state p {
        font-size: 16px;
    }

    .refresh-info {
        text-align: center;
        font-size: 12px;
        color: var(--gray);
        margin-top: 20px;
    }

    @media (max-width: 768px) {
        .online-users-header {
            flex-direction: column;
            gap: 12px;
            align-items: flex-start;
        }

        .online-count {
            align-self: flex-start;
        }

        .user-card {
            padding: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            font-size: 16px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="online-users-page">
    <div class="online-users-header">
        <h1><i class="fas fa-users"></i> Пользователи онлайн</h1>
        <span class="online-count" id="onlineCount">0</span>
    </div>

    <div id="departmentsContainer">
        <div class="empty-state">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>Загрузка...</p>
        </div>
    </div>

    <div class="refresh-info">
        <i class="fas fa-sync-alt"></i> Обновление каждые 10 секунд
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let totalOnline = 0;

    function loadOnlineUsers() {
        fetch('/api/online_users')
            .then(r => r.json())
            .then(data => {
                renderDepartments(data);
            })
            .catch(error => {
                console.error('Error loading online users:', error);
            });
    }

    function renderDepartments(departments) {
        const container = document.getElementById('departmentsContainer');
        const onlineCountEl = document.getElementById('onlineCount');
        
        const departmentNames = Object.keys(departments);
        
        if (departmentNames.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-users-slash"></i>
                    <p>Нет пользователей онлайн</p>
                </div>
            `;
            onlineCountEl.textContent = '0';
            return;
        }

        let total = 0;
        let html = '';

        departmentNames.forEach(deptName => {
            const users = departments[deptName];
            total += users.length;

            html += `
                <div class="department-section">
                    <div class="department-header">
                        <div class="department-icon">
                            <i class="fas fa-building"></i>
                        </div>
                        <span class="department-name">${escapeHtml(deptName)}</span>
                        <span class="department-users-count">${users.length}</span>
                    </div>
                    <div class="users-list">
                        ${users.map(user => renderUserCard(user)).join('')}
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
        onlineCountEl.textContent = total;
        totalOnline = total;
    }

    function renderUserCard(user) {
        const avatarClass = user.role === 'Врач' ? 'doctor' : user.role === 'Физик' ? 'physicist' : 'admin';
        const avatarIcon = user.role === 'Врач' ? 'user-md' : user.role === 'Физик' ? 'atom' : 'user-shield';

        return `
            <div class="user-card">
                <div class="user-avatar ${avatarClass}">
                    <i class="fas fa-${avatarIcon}"></i>
                </div>
                <div class="user-info">
                    <div class="user-name" title="${escapeHtml(user.full_name)}">${escapeHtml(user.full_name)}</div>
                    <div class="user-username">@${escapeHtml(user.username)}</div>
                </div>
                <span class="user-role-badge ${avatarClass}">${user.role}</span>
                <div class="user-status" title="В сети"></div>
            </div>
        `;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Загрузка при старте
    loadOnlineUsers();

    // Обновление каждые 10 секунд
    setInterval(loadOnlineUsers, 10000);
</script>
{% endblock %}
